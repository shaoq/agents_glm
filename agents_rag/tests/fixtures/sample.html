<h1>GLM 模型介绍</h1>
<p>智谱 GLM 模型在中文理解方面表现卓越。GLM-4.5 是当前主力模型，适用于复杂推理、代码生成与企业知识问答等任务。</p>
<p>embedding-3 为检索增强生成提供高质量的向量化支持，默认输出 2048 维向量，能有效衡量文本语义相似度。</p>
<p>智谱 Rerank 模型用于对候选文档精排，与向量检索、BM25 关键词检索组合形成混合检索，显著提升召回质量。</p>
